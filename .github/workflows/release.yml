name: release

# Cut a release by pushing a semver tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
#
# This builds the cgo binary on each platform's native runner, publishes them as
# assets on a GitHub Release, then publishes the single npm package
# @leaperone/remote-au via npm Trusted Publishing (OIDC) — no token required.
# The package's postinstall downloads the matching binary from the Release.
#
# One-time npm setup (no secret needed):
#   On npmjs.com -> @leaperone/remote-au -> Settings -> Trusted Publisher,
#   add a GitHub Actions publisher:
#     Organization/owner: leaperone
#     Repository:         remote-au
#     Workflow filename:  release.yml

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # OIDC for npm Trusted Publishing

jobs:
  build:
    name: build ${{ matrix.npm_platform }}-${{ matrix.npm_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14,         npm_platform: darwin, npm_arch: arm64, goos: darwin,  goarch: arm64 }
          - { runner: macos-13,         npm_platform: darwin, npm_arch: x64,   goos: darwin,  goarch: amd64 }
          - { runner: ubuntu-latest,    npm_platform: linux,  npm_arch: x64,   goos: linux,   goarch: amd64 }
          - { runner: ubuntu-24.04-arm, npm_platform: linux,  npm_arch: arm64, goos: linux,   goarch: arm64 }
          - { runner: windows-latest,   npm_platform: win32,  npm_arch: x64,   goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install MinGW (Windows cgo toolchain)
        if: matrix.npm_platform == 'win32'
        run: choco install mingw -y --no-progress

      - name: Build binary
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          asset=remote-au-${{ matrix.npm_platform }}-${{ matrix.npm_arch }}
          if [ "${{ matrix.npm_platform }}" = "win32" ]; then asset="$asset.exe"; fi
          go build -trimpath -ldflags "-s -w" -o "$asset" ./cmd/remote-au
          ls -la "$asset"

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.npm_platform }}-${{ matrix.npm_arch }}
          path: remote-au-${{ matrix.npm_platform }}-${{ matrix.npm_arch }}*
          if-no-files-found: error

  publish:
    name: GitHub Release + npm (OIDC)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Download all release assets
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: release
          merge-multiple: true

      - name: List release assets
        run: ls -la release

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

      - name: Set package version from tag
        run: node scripts/set-version.mjs "${GITHUB_REF_NAME#v}"

      - name: Publish to npm (Trusted Publishing / OIDC)
        run: npm publish
