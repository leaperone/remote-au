name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: go vet
        env:
          CGO_ENABLED: '1'
        run: go vet ./...

      - name: go build
        env:
          CGO_ENABLED: '1'
        run: go build ./...

      - name: go test (race)
        env:
          CGO_ENABLED: '1'
        run: go test -race ./...
